version: '3.8'
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    env_file:
      - ./.env.dev
    environment:
      - DATABASE_URL=${DB_URL:-mysql+pymysql://root:rootpassword@db:3306/medialab_db}
      - ENVIRONMENT=${ENV:-development}
      - INIT_BASE_STRUCTURE=${INIT_BASE_STRUCTURE:-true}
      - INIT_DEPARTMENT_DATA=${INIT_DEPARTMENT_DATA:-true}
      - INTERACTIVE_ADMIN=${INTERACTIVE_ADMIN:-false}
      - TZ=America/Mexico_City
    depends_on:
      - db
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${DEV_API_URL:-http://localhost:8000/api/v1}
      - TZ=America/Mexico_City
    depends_on:
      - backend
  
  portal-frontend:
    build:
      context: ./portal-frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      - ./portal-frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${DEV_API_URL:-http://localhost:8000/api/v1}
      - TZ=America/Guatemala
    depends_on:
      - backend

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME:-medialab_db}
      - MYSQL_USER=${DB_USER:-medialab_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-MediaLab2025Db$$3cur3}
      - TZ=America/Mexico_City
    volumes:
      - medialab_db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone='-06:00'

volumes:
  medialab_db_data:
  backend_data: