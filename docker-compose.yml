version: '3.8'

# ===============================================
# DOCKER COMPOSE UNIFICADO - DEV/PROD/TEST
# Con Redis para datos no persistentes
# ===============================================

services:
  # ===== BASE DE DATOS =====
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-medialab_db}
      MYSQL_USER: ${DB_USER:-medialab_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-MediaLab2025Db$3cur3}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - medialab_network
    command: --default-authentication-plugin=mysql_native_password --event-scheduler=ON
    profiles:
      - dev
      - prod
      - test

  # ===== REDIS CACHE =====
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - medialab_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    profiles:
      - dev
      - prod
      - test

  # ===== BACKEND API =====
  backend:
    build: 
      context: ./backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    env_file:
      - ${ENV_FILE:-.env.dev}
    depends_on:
      - db
      - redis
    networks:
      - medialab_network
    environment:
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=${ENVIRONMENT:-development}
    profiles:
      - dev
      - prod
      - test

  # ===== BACKEND DESARROLLO =====
  backend-dev:
    build: 
      context: ./backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app:ro
      - backend_data:/app/data
      - backend_logs:/app/logs
    env_file:
      - ${ENV_FILE:-.env.dev}
    depends_on:
      - db
      - redis
    networks:
      - medialab_network
    environment:
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=development
      - DEBUG=true
    profiles:
      - dev-hot

  # ===== FRONTEND DESARROLLO =====
  frontend-dev:
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8000}/api/v1
      - VITE_FRONTEND_URL=http://localhost:5173
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - medialab_network
    profiles:
      - dev
      - dev-hot

  # ===== FRONTEND PRODUCCIÓN =====
  frontend-prod:
    build:
      context: ./frontend
      target: production
      args:
        - VITE_API_URL=${VITE_API_URL:-/api/v1}
        - VITE_FRONTEND_URL=${VITE_FRONTEND_URL:-https://medialab.eklista.com}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - medialab_network
    profiles:
      - prod

  # ===== FRONTEND TESTING =====
  frontend-test:
    build:
      context: ./frontend
      target: testing
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - VITE_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - medialab_network
    profiles:
      - test

  # ===== NGINX REVERSE PROXY =====
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend-prod
    networks:
      - medialab_network
    profiles:
      - prod
    command: >
      sh -c "mkdir -p /var/www/certbot/.well-known/acme-challenge &&
             chmod 755 /var/www/certbot &&
             chmod 755 /var/www/certbot/.well-known &&
             chmod 755 /var/www/certbot/.well-known/acme-challenge &&
             nginx -g 'daemon off;'"

  # ===== REDIS COMMANDER (Opcional - Solo desarrollo) =====
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - medialab_network
    profiles:
      - dev

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  medialab_network:
    driver: bridge