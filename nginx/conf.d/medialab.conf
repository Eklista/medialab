upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend-prod:80;
}

# Configuración temporal para obtener certificados SSL
server {
    listen 80;
    server_name medialab.eklista.com;
    
    # Solo para verificación de dominio de Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    
    # Temporal: permitir acceso a la API para pruebas
    location /api/v1/health {
        proxy_pass http://backend/api/v1/health;
        proxy_set_header Host $host;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }
    
    # Temporal: respuesta simple para el resto
    location / {
        return 200 "Configurando SSL - MediaLab estará disponible pronto";
        add_header Content-Type text/plain;
    }
    
    access_log /var/log/nginx/medialab_access.log;
    error_log /var/log/nginx/medialab_error.log;
}