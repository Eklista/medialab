upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream portal-frontend {
    server portal-frontend:80;
}

# Definición de zonas para limitación de peticiones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Configuración del servidor HTTP (redirección a HTTPS)
server {
    listen 80;
    server_name medialab.eklista.com;
    
    # Redirección a HTTPS
    return 301 https://$host$request_uri;
}

# Configuración del servidor HTTPS
server {
    listen 443 ssl;
    server_name medialab.eklista.com;
    
    # Configuración SSL
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # Configuración SSL mejorada
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    
    # Buffer sizes optimizados para mejor rendimiento
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    proxy_connect_timeout 90;
    proxy_send_timeout 90;
    proxy_read_timeout 90;
    proxy_buffers 32 4k;
    
    # Incluir tipos MIME
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Redirección de /dashboard a /portal (para URLs directas)
    location = /dashboard {
        return 301 $scheme://$host/portal;
    }
    
    # Redirección de /login a /portal/login (para URLs directas)
    location = /login {
        return 301 $scheme://$host/portal/login;
    }
    
    # ====== PORTAL FRONTEND - SITIO COMPLETO ======
    
    # Assets estáticos del portal-frontend
    location ~* ^/portal/(assets|static)/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        rewrite ^/portal/(.*) /$1 break;
        proxy_pass http://portal-frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configuración correcta de Content-Type
        proxy_hide_header Content-Type;
        add_header Content-Type $content_type;
        
        # Cache para archivos estáticos
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    
    # Ruta para index.html del portal-frontend
    location = /portal/ {
        rewrite ^/portal(/.*)$ $1 break;
        proxy_pass http://portal-frontend/index.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Rutas dinámicas del portal-frontend (projects, requests, etc.)
    location ~* ^/portal/.*$ {
        # Si es un archivo estático, pasarlo directamente
        if ($request_uri ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$) {
            rewrite ^/portal/(.*) /$1 break;
            proxy_pass http://portal-frontend;
            break;
        }
        
        # Para todas las demás rutas, enviar a index.html (SPA)
        rewrite ^/portal(/.*)$ $1 break;
        proxy_pass http://portal-frontend/index.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ====== FRONTEND PRINCIPAL ======
    
    # Assets estáticos del frontend principal
    location ~* ^/(assets|static)/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configuración correcta de Content-Type
        proxy_hide_header Content-Type;
        add_header Content-Type $content_type;
        
        # Cache para archivos estáticos
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    
    # Ruta específica para el login del admin
    location = /ml-admin/login {
        proxy_pass http://frontend/ml-admin/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Rutas del ml-admin
    location ~* ^/ml-admin/.*$ {
        # Si es un archivo estático, pasarlo directamente
        if ($request_uri ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$) {
            proxy_pass http://frontend;
            break;
        }
        
        # Para todas las demás rutas, enviar a index.html (SPA)
        proxy_pass http://frontend/index.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Rutas del dashboard principal
    location ~* ^/dashboard/.*$ {
        # Si es un archivo estático, pasarlo directamente
        if ($request_uri ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$) {
            proxy_pass http://frontend;
            break;
        }
        
        # Para todas las demás rutas, enviar a index.html (SPA)
        proxy_pass http://frontend/index.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Frontend principal (landing page, etc.)
    location / {
        # Si es un archivo estático, pasarlo directamente
        if ($request_uri ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$) {
            proxy_pass http://frontend;
            break;
        }
        
        # Para la raíz exacta
        if ($request_uri = "/") {
            proxy_pass http://frontend;
            break;
        }
        
        # Para todas las demás rutas, enviar a index.html (SPA)
        proxy_pass http://frontend/index.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ====== BACKEND API CON AUTENTICACIÓN Y SEGURIDAD ======
    
    # Documentación de API (acceso público)
    location = /api/v1/docs {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
    }
    
    # Rutas de documentación de Swagger adicionales (sin autenticación)
    location ~* ^/api/v1/docs/.* {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
    }
    
    # Rutas administrativas con autenticación básica
    location ~ ^/api/v1/(admin|config|settings|users/create) {
        # Autenticación básica para rutas admin
        auth_basic "API Admin Access";
        auth_basic_user_file /etc/nginx/auth/api_passwords;
        
        # Proxy pass para rutas admin
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
    }
    
    # Rutas públicas de API (login, registro, etc.)
    location ~ ^/api/v1/(auth|login|register|public|health) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
    }
    
    # Rutas necesarias para el frontend
    location ~ ^/api/v1/(user|users|projects|dashboard|settings|data|media|user-profile|metrics) {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
    }
    
    # Rutas de integración de API (verificación de API key)
    location ~ ^/api/v1/(integration|webhook|partner) {
        # Verificar API key
        if ($http_x_api_key = "") {
            return 403 '{"error": "Valid API key required"}';
        }
        
        # Validar API key (actualiza con tus API keys reales)
        if ($http_x_api_key !~ "^(valid_key_1|valid_key_2|valid_key_3)$") {
            return 403 '{"error": "Invalid API key"}';
        }
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
    }
    
    # Todas las demás rutas de API (requieren autenticación)
    location /api/v1/ {
        # Verificar token de autenticación para rutas no manejadas arriba
        if ($http_authorization = "") {
            return 401 '{"error": "Authentication required"}';
        }
        
        # Limitar métodos HTTP permitidos
        limit_except GET POST PUT DELETE OPTIONS {
            deny all;
        }
        
        # Protección contra ataques de fuerza bruta
        limit_req zone=api_limit burst=20 nodelay;
        
        # Proxy pass para API genérico
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_cache_bypass $http_upgrade;
        
        # Manejo de OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
    
    # Ubicación personalizada para errores de API
    location @api_error {
        default_type application/json;
        return 401 '{"error": "Authentication required", "status": 401}';
    }
    
    # Logs para depuración
    access_log /var/log/nginx/medialab_access.log;
    error_log /var/log/nginx/medialab_error.log debug;
}