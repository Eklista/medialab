upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream portal-frontend {
    server portal-frontend:80;
}

# Servidor HTTP - será reemplazado o modificado por el script
server {
    listen 80;
    server_name medialab.eklista.com;
    
    # SSL_REDIRECT
    
    # Ruta para assets del portal-frontend (IMPORTANTE para que funcionen los CSS/JS)
    location ~* ^/portal/assets/.*\.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Quitamos /portal/ del principio de la URL antes de pasarla al servicio
        rewrite ^/portal/(.*) /$1 break;
        proxy_pass http://portal-frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache para archivos estáticos
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    
    # Ruta específica para el portal externo
    location /portal/ {
        # Quitamos /portal/ del principio de la URL antes de pasarla al servicio
        rewrite ^/portal/(.*) /$1 break;
        proxy_pass http://portal-frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirección para /portal sin el slash final
    location = /portal {
        return 301 $scheme://$host/portal/;
    }

    # Ruta específica para el login del admin
    location /ml-admin/ {
        proxy_pass http://frontend/ml-admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend principal - Solo se usa si SSL está deshabilitado
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API - Solo se usa si SSL está deshabilitado
    location /api/v1/ {
        proxy_pass http://backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Configuración CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        # Manejo de OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
    
    # Archivos estáticos
    location /static/ {
        proxy_pass http://backend/static/;
    }
    
    # Logs para depuración
    access_log /var/log/nginx/medialab_access.log;
    error_log /var/log/nginx/medialab_error.log;
}

# SSL_SERVER_START
server {
    listen 443 ssl;
    server_name medialab.eklista.com;
    
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # Ruta para assets del portal-frontend (IMPORTANTE para que funcionen los CSS/JS)
