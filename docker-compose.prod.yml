version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: dockerfile
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./scripts:/scripts
    environment:
      - DATABASE_URL=mysql+pymysql://medialab_user:MediaLab2025Db$$3cur3@db:3306/medialab_db
      - ENVIRONMENT=production
    depends_on:
      - db
    command: bash -c "apt-get update && apt-get install -y default-mysql-client netcat-traditional && sleep 30 && python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
  
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile 
    restart: always
    environment:
      - VITE_API_URL=https://medialab.eklista.com/api/v1
    volumes:
      - ./frontend/dist:/app/dist

  db:
    image: mysql:8.0
    restart: always
    ports:
      - "127.0.0.1:3306:3306" 
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=medialab_db
      - MYSQL_USER=medialab_user
      - MYSQL_PASSWORD=MediaLab2025Db$$3cur3
    volumes:
      - medialab-db-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  medialab-db-data:
  frontend-build: